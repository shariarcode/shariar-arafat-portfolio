<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>404 - Page Not Found</title>
    <style>
      body { margin: 0; font-family: Inter, Arial, sans-serif; background: #f8fafc; color: #111827; }
      main { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; }
      h1 { margin: 0 0 8px; font-size: 52px; }
      p { margin: 8px 0; color: #4b5563; }
      a { display: inline-block; margin-top: 20px; padding: 12px 18px; border-radius: 10px; background: #6f42c1; color: #fff; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <div>
        <p>404 Error</p>
        <h1>Page not found</h1>
        <p>The page you requested does not exist.</p>
        <a href="/">Return to homepage</a>
      </div>
    </main>
  </body>
</html>
